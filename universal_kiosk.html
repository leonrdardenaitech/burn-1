<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Universal Spatial Kiosk | Hotspot & Angle View Protocol</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --brand-accent: #ff4500; /* Dynamic Accent Color */
      --glass-bg: rgba(5, 5, 8, 0.88);
    }

    body, html {
      margin: 0; padding: 0; width: 100vw; height: 100vh;
      background-color: #040406; display: flex; justify-content: center; align-items: center;
      font-family: 'Rajdhani', sans-serif; overflow: hidden;
    }

    /* 3:4 SPATIAL DEVICE DISPLAY FRAME */
    #spatial-frame {
      position: relative; width: 100%; max-width: 450px; height: 100dvh; max-height: 800px;
      background-color: #000; overflow: hidden;
      border-radius: 32px; border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
    }

    /* BACKGROUND ANGLE MEDIA LAYER (PHOTO OR VIDEO) */
    .bg-media-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    }
    #bg-image { width: 100%; height: 100%; object-fit: cover; }
    #bg-video { width: 100%; height: 111.11%; object-fit: cover; object-position: left top; }

    /* HUD OVERLAY */
    .hud-header {
      position: absolute; top: 15px; left: 15px; right: 15px; z-index: 15;
      display: flex; justify-between; align-items: center;
      background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(10px);
      padding: 10px 16px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15);
    }

    /* INVISIBLE HOTSPOTS LAYER */
    .hotspot {
      position: absolute; z-index: 10; cursor: pointer;
      transition: background 0.3s;
    }
    .hotspot-debug {
      border: 2px dashed var(--brand-accent);
      background: rgba(255, 69, 0, 0.15);
    }

    /* SLIDING LEFT DRAWER (MENU) */
    #left-drawer {
      position: absolute; top: 0; left: 0; width: 85%; height: 100%;
      background: var(--glass-bg); backdrop-filter: blur(16px);
      z-index: 50; transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      border-right: 2px solid var(--brand-accent); color: #fff;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #left-drawer.active { transform: translateX(0%); }

    /* SLIDING RIGHT DRAWER (ORDER CART) */
    #right-drawer {
      position: absolute; top: 0; right: 0; width: 85%; height: 100%;
      background: var(--glass-bg); backdrop-filter: blur(16px);
      z-index: 50; transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      border-left: 2px solid var(--brand-accent); color: #fff;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #right-drawer.active { transform: translateX(0%); }

    /* FLOATING ACTION TRIGGER BUTTONS */
    .floating-trigger-btn {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 12;
      background: rgba(0, 0, 0, 0.75); color: #fff; border: 2px solid var(--brand-accent);
      padding: 12px 30px; border-radius: 30px; font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem; font-weight: bold; text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(8px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
      transition: all 0.3s;
    }
    .floating-trigger-btn:hover { background: var(--brand-accent); color: #000; }
  </style>
</head>
<body>

  <div id="spatial-frame">
    
    <!-- TOP HUD BAR -->
    <div class="hud-header">
      <div>
        <span id="hud-brand-name" class="font-bold text-white tracking-wider block text-xs">NEON INK TATTOO</span>
        <span class="text-[9px] text-gray-400">SPATIAL ANGLE VIEW PROTOCOL</span>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleHotspotDebug()" class="text-[9px] bg-gray-900 border border-gray-700 text-gray-300 px-2 py-1 rounded">
          🎯 HOTSPOTS
        </button>
        <a href="https://burn-1.com" class="text-[9px] bg-orange-950 border border-orange-700 text-orange-400 px-2 py-1 rounded">
          HUB ➔
        </a>
      </div>
    </div>

    <!-- BACKGROUND ANGLE MEDIA LAYER -->
    <div class="bg-media-container">
      <img id="bg-image" src="assets/Cell_phones_falling_1.gif" alt="Background Spatial Angle">
    </div>

    <!-- INVISIBLE HOTSPOT OVERLAYS -->
    <!-- Hotspot 1: Primary Counter / Register Target (Bottom Right) -->
    <div id="hotspot-1" class="hotspot" style="top: 45%; right: 5%; width: 40%; height: 40%;" onclick="openLeftDrawer('primary')"></div>

    <!-- Hotspot 2: Wall / Menu / Display Board Target (Mid Left) -->
    <div id="hotspot-2" class="hotspot" style="top: 25%; left: 5%; width: 40%; height: 45%;" onclick="openLeftDrawer('secondary')"></div>

    <!-- FLOATING MAIN MENU TRIGGER BUTTON -->
    <button class="floating-trigger-btn" onclick="openLeftDrawer('all')">
      📋 VIEW MENU
    </button>

    <!-- SLIDING LEFT DRAWER (SPATIAL MENU) -->
    <div id="left-drawer">
      <div class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div>
          <span class="text-[10px] text-orange-400 font-bold uppercase tracking-widest block">SPATIAL CATALOG</span>
          <h2 id="menu-drawer-title" class="font-bold text-white text-xl">STORE MENU</h2>
        </div>
        <button onclick="closeDrawers()" class="text-2xl text-orange-400 font-bold">✕</button>
      </div>

      <div id="menu-items-list" class="p-6 overflow-y-auto space-y-4 flex-grow text-xs font-mono">
        <!-- Dynamic Menu Items Injected via storeConfig -->
      </div>

      <div class="p-4 border-t border-gray-800">
        <button onclick="openRightDrawer()" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-black font-bold py-3 rounded text-xs uppercase tracking-wider">
          🛒 VIEW ORDER CART
        </button>
      </div>
    </div>

    <!-- SLIDING RIGHT DRAWER (ORDER & SUBMIT REQUEST) -->
    <div id="right-drawer">
      <div class="p-6 border-b border-gray-800 flex justify-between items-center">
        <div>
          <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest block">ORDER SUMMARY</span>
          <h2 class="font-bold text-white text-xl">SUBMIT REQUEST</h2>
        </div>
        <button onclick="closeDrawers()" class="text-2xl text-emerald-400 font-bold">✕</button>
      </div>

      <div class="p-6 space-y-4 flex-grow text-xs">
        <div>
          <label class="block text-gray-400 mb-1">Your Name:</label>
          <input type="text" id="cust-name" placeholder="Alex Darden" class="w-full bg-black border border-gray-800 rounded p-3 text-white outline-none focus:border-orange-500">
        </div>
        <div>
          <label class="block text-gray-400 mb-1">Contact Phone / Email:</label>
          <input type="text" id="cust-contact" placeholder="(555) 019-2831" class="w-full bg-black border border-gray-800 rounded p-3 text-white outline-none focus:border-orange-500">
        </div>
        <div>
          <label class="block text-gray-400 mb-1">Order Notes / Customization:</label>
          <textarea rows="3" id="cust-notes" placeholder="Add specific order notes..." class="w-full bg-black border border-gray-800 rounded p-3 text-white outline-none focus:border-orange-500 resize-none"></textarea>
        </div>
      </div>

      <div class="p-4 border-t border-gray-800">
        <button onclick="submitOrderAction()" class="w-full bg-emerald-500 text-black font-bold py-3.5 rounded text-xs uppercase tracking-wider">
          ✅ TRANSMIT ORDER REQUEST
        </button>
      </div>
    </div>

  </div>

  <script>
    // ===================================================
    // UNIVERSAL SPATIAL KIOSK CONFIGURATION OBJECT (K.I.S.S.)
    // Easily customize for any customer photo angle or business!
    // ===================================================
    const storeConfig = {
      brandName: "SHAY SLAW DAWGS",
      accentColor: "#ff4500", // Hex color accent
      bgMedia: "assets/Cell_phones_falling_1.gif", // Photo or Video path
      menuCategories: [
        {
          name: "Dawgs & Links",
          items: [
            { title: "Naked Dawg", price: "$5.00", desc: "Classic hot dog with choice of condiments" },
            { title: "Southern Slaw Dawg", price: "$7.00", desc: "Topped with homemade Southern slaw" },
            { title: "Chili & Cheese Dawg", price: "$9.00", desc: "Loaded with house chili and melted cheddar" }
          ]
        },
        {
          name: "Sides & Drinks",
          items: [
            { title: "Fries (Shay's Shake)", price: "$3.00", desc: "Crispy fries with signature seasoning" },
            { title: "Slushie Special", price: "$3.00", desc: "Cherry, Blue Razz, or Mystery" }
          ]
        }
      ]
    };

    // Initialize Page
    document.getElementById('hud-brand-name').innerText = storeConfig.brandName;
    document.documentElement.style.setProperty('--brand-accent', storeConfig.accentColor);

    // Populate Menu Items
    const menuContainer = document.getElementById('menu-items-list');
    menuContainer.innerHTML = storeConfig.menuCategories.map(cat => `
      <div class="mb-4">
        <h3 class="text-xs text-orange-400 font-bold border-b border-gray-800 pb-1 mb-2 uppercase">${cat.name}</h3>
        ${cat.items.map(item => `
          <div class="flex justify-between items-start mb-3 pb-2 border-b border-gray-900">
            <div>
              <div class="text-white font-bold text-sm">${item.title}</div>
              <div class="text-gray-500 text-[10px]">${item.desc}</div>
            </div>
            <span class="text-orange-400 font-bold text-xs">${item.price}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

    // Drawer Controls
    function openLeftDrawer(target) {
      closeDrawers();
      document.getElementById('left-drawer').classList.add('active');
    }
    function openRightDrawer() {
      closeDrawers();
      document.getElementById('right-drawer').classList.add('active');
    }
    function closeDrawers() {
      document.getElementById('left-drawer').classList.remove('active');
      document.getElementById('right-drawer').classList.remove('active');
    }

    function toggleHotspotDebug() {
      document.querySelectorAll('.hotspot').forEach(el => el.classList.toggle('hotspot-debug'));
    }

    function submitOrderAction() {
      const name = document.getElementById('cust-name').value || 'Customer';
      alert(`Order submitted for ${name}! Thank you.`);
      closeDrawers();
    }
  </script>
</body>
</html>
